services:
  # Backend API Service (Render)
  # Frontend is deployed on Vercel (never sleeps)
  - type: web
    name: freshmarket-api
    env: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false # Set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: ujjwalchauhan599@gmail.com
      - key: ADMIN_PASSWORD
        value: Arjun@321
      - key: ALLOWED_ORIGIN
        sync: false # Set to your Vercel frontend URL
      - key: FRONTEND_URL
        sync: false # Set to your Vercel frontend URL
      # SMTP Configuration (set in Render dashboard)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: FreshMarket
