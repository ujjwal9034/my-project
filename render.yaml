services:
  # Backend Service
  - type: web
    name: freshmarket-api
    env: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        fromValue: ${MONGODB_URI} # To be set in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        value: ujjwalchauhan599@gmail.com
      - key: ADMIN_PASSWORD
        value: Arjun@321
      - key: ALLOWED_ORIGIN
        value: "*" # Or your frontend URL

  # Frontend Service
  - type: web
    name: freshmarket-web
    env: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: freshmarket-api
          property: host
    # This ensures the backend starts first
    autoDeploy: true
